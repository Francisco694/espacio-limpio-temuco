<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cambiar Contraseña — Espacio Limpio CRM</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#3b82f6',
                        dark: '#0f172a',
                        light: '#ffffff',
                        slate50: '#f8fafc',
                    },
                    fontFamily: {
                        display: ['Syne', 'sans-serif'],
                        body: ['DM Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="font-body bg-slate50 text-slate-800 antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-100 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-indigo-100 rounded-full mix-blend-multiply filter blur-[80px] opacity-40 pointer-events-none"></div>

    <main class="w-full max-w-md relative z-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-primary text-white rounded-xl font-display font-extrabold text-2xl shadow-lg shadow-blue-600/20 mb-4">
                EL
            </div>
            <h1 class="font-display font-bold text-2xl text-slate-900 mb-1 tracking-tight">Cambiar Contraseña</h1>
            <p class="text-sm text-slate-500">Define una nueva contraseña para tu cuenta.</p>
        </div>

        <section class="bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-200 p-8">
            <div id="status-box" class="bg-blue-50 border border-blue-200 text-blue-700 text-sm px-4 py-3 rounded-lg flex items-start gap-2">
                <i data-lucide="loader-2" class="w-4 h-4 flex-shrink-0 mt-0.5 animate-spin"></i>
                <span id="status-text">Validando enlace seguro...</span>
            </div>

            <form id="reset-password-form" class="hidden space-y-5 mt-5" novalidate>
                <div>
                    <label for="new-password" class="block text-xs font-semibold text-slate-600 mb-1.5">Nueva Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input
                            type="password"
                            id="new-password"
                            name="new-password"
                            autocomplete="new-password"
                            minlength="8"
                            class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                            required
                        />
                    </div>
                </div>

                <div>
                    <label for="confirm-password" class="block text-xs font-semibold text-slate-600 mb-1.5">Confirmar Nueva Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                            <i data-lucide="shield-check" class="w-4 h-4 text-slate-400"></i>
                        </div>
                        <input
                            type="password"
                            id="confirm-password"
                            name="confirm-password"
                            autocomplete="new-password"
                            minlength="8"
                            class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all"
                            required
                        />
                    </div>
                </div>

                <div id="password-rules" class="text-xs text-slate-500 leading-relaxed">
                    Usa al menos 8 caracteres, una mayúscula y un número.
                </div>

                <div id="form-message" class="hidden text-sm font-medium p-3 rounded-lg flex items-start gap-2">
                    <i data-lucide="info" class="w-4 h-4 flex-shrink-0 mt-0.5"></i>
                    <span id="form-message-text"></span>
                </div>

                <button
                    type="submit"
                    id="btn-update-password"
                    class="w-full bg-primary hover:bg-blue-700 text-white font-bold text-sm py-2.5 rounded-lg flex items-center justify-center gap-2 transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5 disabled:opacity-70 disabled:cursor-not-allowed disabled:transform-none"
                >
                    <span id="btn-update-text">Actualizar Contraseña</span>
                    <i data-lucide="check" id="btn-update-icon" class="w-4 h-4"></i>
                    <i data-lucide="loader-2" id="btn-update-spinner" class="w-4 h-4 animate-spin hidden"></i>
                </button>
            </form>

            <a id="login-link" href="login.html" class="hidden mt-5 w-full bg-slate-800 hover:bg-slate-900 text-white font-bold text-sm py-2.5 rounded-lg items-center justify-center gap-2 transition-all shadow-sm">
                Ir al Login
                <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </a>
        </section>

        <div class="text-center mt-8">
            <a href="index.html" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Volver a la página principal
            </a>
        </div>
    </main>

    <script type="module" src="js/reset-password.js"></script>
</body>
</html>
